name: Dependent Jobs Workflow

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Display Build Start
        run: echo "Building application..."

      - name: Simulate Build Process
        run: sleep 5

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Display Test Start
        run: echo "Running tests..."

      - name: Simulate Testing
        run: sleep 5

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Display Deployment Start
        run: echo "Deploying application..."

      - name: Simulate Deployment
        run: sleep 5
